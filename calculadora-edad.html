<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Edad | UtiliWeb360</title>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f4f7fb;
}

header{
background:linear-gradient(90deg,#0066ff,#00b894);
color:white;
padding:30px;
text-align:center;
}

header h1{
margin:0;
font-size:40px;
}

header p{
font-size:20px;
}

.contenedor{
max-width:600px;
margin:40px auto;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
text-align:center;
}

input{
width:90%;
padding:18px;
font-size:22px;
border-radius:10px;
border:2px solid #ddd;
}

button{
margin-top:20px;
padding:15px 25px;
font-size:20px;
border:none;
border-radius:10px;
background:#0066ff;
color:white;
cursor:pointer;
transition:.3s;
margin-right:10px;
}

button:hover{
transform:scale(1.05);
background:#004ecc;
}

#resultado{
margin-top:30px;
font-size:32px;
font-weight:bold;
color:#0066ff;
display:none;
animation:zoom .5s;
}

@keyframes zoom{
0%{transform:scale(.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

.acciones{
display:none;
margin-top:25px;
}

.volver{
display:inline-block;
margin-top:30px;
text-decoration:none;
font-size:20px;
color:#0066ff;
font-weight:bold;
}
</style>

</head>

<body>

<header>
<h1>🎂 Calculadora de Edad</h1>
<p>Descubre tu edad en segundos.</p>
</header>

<div class="contenedor">

<input type="date" id="fecha">

<br>

<button onclick="calcularEdad()">🎉 Calcular edad</button>

<div id="resultado"></div>

<div class="acciones" id="acciones">
