<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Edad | UtiliWeb360</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f7fa;
}

header{
    background:linear-gradient(90deg,#0066ff,#00b894);
    color:white;
    padding:25px;
    text-align:center;
}

.contenedor{
    max-width:500px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:#0066ff;
    color:white;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#004ecc;
}

#resultado{
    margin-top:25px;
    font-size:22px;
    font-weight:bold;
}
</style>

</head>

<body>

<header>
<h1>Calculadora de Edad</h1>
<p>Calcula tu edad en segundos.</p>
</header>

<div class="contenedor">

<input type="date" id="fecha">

<br><br>

<button onclick="calcularEdad()">Calcular edad</button>

<div id="resultado"></div>
    <div id="diasVida"></div>
    <div id="proximoCumple"></div>
<br>

<button onclick="compartirWhatsApp()">
Compartir por WhatsApp
</button>    
    
<br>

<a href="index.html">Volver al inicio</a>

</div>

<script>

function calcularEdad(){

let valorFecha = document.getElementById("fecha").value;

if(valorFecha==""){
    alert("Selecciona una fecha.");
    return;
}

let fecha = new Date(valorFecha + "T00:00:00");

let hoy=new Date();

let edad=hoy.getFullYear()-fecha.getFullYear();

let mes=hoy.getMonth()-fecha.getMonth();

if(mes<0 || (mes===0 && hoy.getDate()<fecha.getDate())){
edad--;
}

document.getElementById("resultado").innerHTML=
"Tienes <b>"+edad+"</b> años.";
   // Días vividos
let diferencia = hoy.getTime() - fecha.getTime();

let diasVividos = Math.floor(diferencia / (1000 * 60 * 60 * 24));

document.getElementById("diasVida").innerHTML =
"Has vivido <b>" + diasVividos.toLocaleString() + "</b> días."; 
    // Próximo cumpleaños
// Próximo cumpleaños
let proximoCumple = new Date(hoy.getFullYear(), fecha.getMonth(), fecha.getDate());

if (proximoCumple < new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate())) {
    proximoCumple.setFullYear(proximoCumple.getFullYear() + 1);
}

// Quitar la hora para evitar desfases
let hoySinHora = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
let cumpleSinHora = new Date(proximoCumple.getFullYear(), proximoCumple.getMonth(), proximoCumple.getDate());

let diasRestantes = Math.round(
    (cumpleSinHora - hoySinHora) / (1000 * 60 * 60 * 24)
);

let opciones = {
    day: "numeric",
    month: "long",
    year: "numeric"
};

document.getElementById("proximoCumple").innerHTML =
"🎂 Tu próximo cumpleaños será el <b>" +
proximoCumple.toLocaleDateString("es-ES", opciones) +
"</b><br>Faltan <b>" +
diasRestantes +
"</b> días.";

}


function compartirWhatsApp(){

let resultado = document.getElementById("resultado").innerText;

if(resultado==""){
    alert("Primero calcula tu edad.");
    return;
}

let mensaje =
"Hola, acabo de calcular mi edad.\n\n" +
resultado +
"\n\nCalculado en UtiliWeb360\n" +
"https://utiliweb360.github.io";

let url = "https://api.whatsapp.com/send?text=" + encodeURIComponent(mensaje);

window.location.href = url;

}
    </script>
</body>
</html>
