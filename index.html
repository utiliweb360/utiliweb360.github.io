<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UtiliWeb360</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f7fb;
}

header{
    background:linear-gradient(90deg,#0066ff,#00b894);
    color:white;
    padding:25px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:42px;
}

header p{
    margin-top:10px;
}

.search{
    text-align:center;
    margin:30px;
}

.search input{
    width:85%;
    max-width:600px;
    padding:15px;
    border-radius:30px;
    border:none;
    font-size:18px;
    box-shadow:0 3px 12px rgba(0,0,0,.15);
}

section{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

footer{
    margin-top:40px;
    background:#111827;
    color:white;
    text-align:center;
    padding:25px;
}
</style>

</head>

<body>

<header>

<h1>UtiliWeb360</h1>

<p>Todas las herramientas que necesitas, en un solo lugar.</p>

</header>

<div class="search">

<input type="text" placeholder="🔍 Buscar una herramienta...">

</div>

<section>

<h2>Herramientas</h2>

<div class="grid">

<div class="card">🧮<br><br>Calculadora de Porcentajes</div>

<div class="card">💰<br><br>Calculadora de IGV</div>

<div class="card">📅<br><br>Calculadora de Edad</div>

<div class="card">🔐<br><br>Generador de Contraseñas</div>

<div class="card">📱<br><br>Generador QR</div>

<div class="card">🤖<br><br>Herramientas IA</div>

</div>

</section>

<footer>

© 2026 UtiliWeb360

</footer>

</body>
</html>
