<!DOCTYPE html>
<html lang="es">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora IGV Perú | UtiliWeb360</title>

<link rel="icon" type="image/jpeg" href="logo.jpg">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f5f7fa;
}

header{
background:linear-gradient(135deg,#2563eb,#06b6d4);
color:white;
padding:40px 20px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.contenedor{
max-width:600px;
margin:40px auto;
background:white;
padding:35px;
border-radius:22px;
box-shadow:0 15px 35px rgba(0,0,0,.12);
text-align:center;
}

select,input{
width:100%;
padding:12px;
font-size:18px;
margin-top:15px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
margin-top:15px;
padding:14px 24px;
font-size:18px;
font-weight:600;
border:none;
border-radius:12px;
cursor:pointer;
background:#2563eb;
color:white;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(37,99,235,.35);
}

#resultado{
margin-top:25px;
font-size:22px;
line-height:1.8;
}

</style>

</head>

<body>

<header>

<h1>Calculadora de IGV</h1>

<p>Calcula el IGV del Perú (18%).</p>

</header>

<div class="contenedor">

<select id="tipo">

<option value="agregar">Agregar IGV</option>

<option value="quitar">Quitar IGV</option>

</select>

<input
type="number"
id="monto"
placeholder="Ingresa el monto">

<button onclick="calcularIGV()">Calcular</button>
<button onclick="limpiar()">🧹 Limpiar</button>
    
<div id="resultado"></div>
<br><br>
<button onclick="compartirWhatsApp()">📤 Compartir por WhatsApp</button>
<br><br>
<a href="index.html">
    <button>🏠 Volver al inicio</button>
</a>
</div>

<script>

function calcularIGV(){

let monto=parseFloat(document.getElementById("monto").value);

if(isNaN(monto)){
alert("Ingresa un monto.");
return;
}

let html="";

if(document.getElementById("tipo").value=="agregar"){

let igv=monto*0.18;

let total=monto+igv;

html=`
Precio sin IGV:<br>
<b>S/ ${monto.toFixed(2)}</b><br><br>

IGV:<br>
<b>S/ ${igv.toFixed(2)}</b><br><br>

Precio con IGV:<br>
<b>S/ ${total.toFixed(2)}</b>
`;

}else{

let base=monto/1.18;

let igv=monto-base;

html=`
Precio con IGV:<br>
<b>S/ ${monto.toFixed(2)}</b><br><br>

IGV:<br>
<b>S/ ${igv.toFixed(2)}</b><br><br>

Precio sin IGV:<br>
<b>S/ ${base.toFixed(2)}</b>
`;

}

document.getElementById("resultado").innerHTML=html;

}
function limpiar(){
    document.getElementById("monto").value = "";
    document.getElementById("resultado").innerHTML = "";
}
    function compartirWhatsApp(){

let texto = document.getElementById("resultado").innerText;

if(texto==""){
    alert("Primero calcula el IGV.");
    return;
}

let url = "https://api.whatsapp.com/send?text=" +
encodeURIComponent(
texto +
"\n\n🧮 Resultado calculado en UtiliWeb360." +
"\n\n🚀 ¡Pruébalo tú también! Calcula el IGV en segundos, gratis y desde cualquier dispositivo." +
"\n\nhttps://utiliweb360.github.io/calculadora-igv.html"
);
window.location.href = url;

}
</script>

</body>
</html>
