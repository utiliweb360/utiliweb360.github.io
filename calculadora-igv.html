<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora IGV Perú | UtiliWeb360</title>

<link rel="icon" type="image/jpeg" href="logo.jpg">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fa;
}

header{
background:linear-gradient(90deg,#0066ff,#00b894);
color:white;
text-align:center;
padding:25px;
}

.contenedor{
max-width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
text-align:center;
}

select,input{
width:100%;
padding:12px;
font-size:18px;
margin-top:15px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
background:#0066ff;
color:white;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#004ecc;
}

#resultado{
margin-top:25px;
font-size:22px;
line-height:1.8;
}

</style>

</head>

<body>

<header>

<h1>Calculadora de IGV</h1>

<p>Calcula el IGV del Perú (18%).</p>

</header>

<div class="contenedor">

<select id="tipo">

<option value="agregar">Agregar IGV</option>

<option value="quitar">Quitar IGV</option>

</select>

<input
type="number"
id="monto"
placeholder="Ingresa el monto">

<button onclick="calcularIGV()">Calcular</button>
<button onclick="limpiar()">🧹 Limpiar</button>
<button onclick="compartirWhatsApp()">📤 Compartir por WhatsApp</button>
    
<div id="resultado"></div>
<br><br>

<a href="index.html">
    <button>🏠 Volver al inicio</button>
</a>
</div>

<script>

function calcularIGV(){

let monto=parseFloat(document.getElementById("monto").value);

if(isNaN(monto)){
alert("Ingresa un monto.");
return;
}

let html="";

if(document.getElementById("tipo").value=="agregar"){

let igv=monto*0.18;

let total=monto+igv;

html=`
Precio sin IGV:<br>
<b>S/ ${monto.toFixed(2)}</b><br><br>

IGV:<br>
<b>S/ ${igv.toFixed(2)}</b><br><br>

Precio con IGV:<br>
<b>S/ ${total.toFixed(2)}</b>
`;

}else{

let base=monto/1.18;

let igv=monto-base;

html=`
Precio con IGV:<br>
<b>S/ ${monto.toFixed(2)}</b><br><br>

IGV:<br>
<b>S/ ${igv.toFixed(2)}</b><br><br>

Precio sin IGV:<br>
<b>S/ ${base.toFixed(2)}</b>
`;

}

document.getElementById("resultado").innerHTML=html;

}
function limpiar(){
    document.getElementById("monto").value = "";
    document.getElementById("resultado").innerHTML = "";
}
    function compartirWhatsApp(){

let texto = document.getElementById("resultado").innerText;

if(texto==""){
    alert("Primero calcula el IGV.");
    return;
}

let url = "https://api.whatsapp.com/send?text=" +
encodeURIComponent(texto + "\n\nCalculado en UtiliWeb360");

window.location.href = url;

}
</script>

</body>
</html>
